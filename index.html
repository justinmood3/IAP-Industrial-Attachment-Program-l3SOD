<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="2.png" type="image/png">
        <title>CURRENT CONVERTER 2026</title>
        <link rel="styleSheet" href="style.css">
    </head>
    <body>
        <header>
            <img src="1.png" controls width="50" height="50">
            <h3>CURRENT CONVERTER 2026</h3>
            <nav>
                <a href="index.html" >Home</a>
                <a href="converter.html">Converter</a>
                <a href="details.html">Details</a>
                <a href="history.html">history</a>
                <a href="settings.html">settings</a>
            </nav>
        </header>
    <div class="div"><pre>
💱 Currency made simple
Convert money instantly in real-time
    </pre>
    </div>
    <div class="con">
        <input type="number" id="amount" placeholder="ENTER AMOUNT"><br><br>
        <label>FROM:</label>
        <select id="fromCurrency">
            <option value="RWF">RWF</option>
            <option value="USD">USD</option>
           <option value="EUR">EUR</option>
        </select>&nbsp;&nbsp;&nbsp;
       <label>TO:</label> <select id="toCurrency">
       <option value="USD">USD</option>
            <option value="RWF">RWF</option>
           <option value="EUR">EUR</option>
        </select><br><br>
        <button onclick="convert()">convert</button>
        <p id="result"></p>
    </div><br><br>
    for more <button class="btn"><a href="converter.html">GET Start</a></button>
    <script>
        const rates = {
  USD: 1,
  EUR: 0.92,
  RWF: 1300
};

function convert() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("fromCurrency").value;
  let to = document.getElementById("toCurrency").value;

  if (!amount || amount <= 0) {
    alert("Enter a valid amount");
    return;
  }

  let result = (amount / rates[from]) * rates[to];

  document.getElementById("result").innerText =
    `${amount} ${from} = ${result.toFixed(2)} ${to}`;

  saveHistory(amount, from, to, result);
}
    </script>
    </body>
