<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="2.png" type="image/png">
  <title>CURRENCY DETAILS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="styleSheet" href="settings.css">
  <script src="settings.js" defer></script>
</head>

<body>

<header>
  <img src="1.png" width="50" height="50">
  <h3 data-i18n="header_details">CURRENCY DETAILS DASHBOARD</h3>

  <nav>
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="converter.html" data-i18n="nav_converter">Converter</a>
    <a href="details.html" data-i18n="nav_details">Details</a>
    <a href="history.html" data-i18n="nav_history">History</a>
    <a href="settings.html" data-i18n="nav_settings">Settings</a>
  </nav>
</header>

<div class="box">
  <label data-i18n="details_select_currency">Select Currency:</label>
  <select id="currencySelect" onchange="updateDetails()">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
    <option value="RWF">RWF</option>
    <option value="KES">KES</option>
    <option value="UGX">UGX</option>
    <option value="TZS">TZS</option>
    <option value="NGN">NGN</option>
    <option value="ZAR">ZAR</option>
    <option value="JPY">JPY</option>
  </select>

  <h2 id="currencyTitle"></h2>
  <p id="liveRate"></p>
</div>

<div class="row">
  <div class="card">
    <h3 data-i18n="details_demand_impact">Demand Impact</h3>
    <p id="demand"></p>
  </div>

  <div class="card">
    <h3 data-i18n="details_compared_usd">Compared to USD</h3>
    <p id="compare"></p>
  </div>

  <div class="card">
    <h3 data-i18n="details_trend_status">Trend Status</h3>
    <p id="trend"></p>
  </div>
</div>

<div class="box">
  <h3 data-i18n="details_historical_trend">Historical Trend (Mock Chart)</h3>
  <canvas id="chart"></canvas>
</div>

<div class="box">
  <h3 data-i18n="details_strength_comparison">Currency Strength Comparison (vs USD)</h3>
  <table border="1" width="100%" cellpadding="10">
    <tr>
      <th data-i18n="table_currency">Currency</th>
      <th data-i18n="table_rate">Rate (vs 1 USD)</th>
      <th data-i18n="table_strength_bar">Strength Bar</th>
    </tr>
    <tbody id="compareTable"></tbody>
  </table>
</div>

<script>
let baseRates = {
  USD: 1,
  EUR: 0.92,
  GBP: 0.78,
  RWF: 1300,
  KES: 130,
  UGX: 3800,
  TZS: 2500,
  NGN: 1500,
  ZAR: 18,
  JPY: 150
};

function getDemandFactor(currency) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  let count = history.filter(h =>
    h.from === currency || h.to === currency
  ).length;

  let demand = 1 + (count * 0.03);
  if (demand > 2.5) demand = 2.5;

  return demand;
}

function updateDetails() {
  let currency = document.getElementById("currencySelect").value;
  let demandFactor = getDemandFactor(currency);
  let rate = baseRates[currency] * demandFactor;

  document.getElementById("currencyTitle").innerText =
    currency + " " + window.translateText("details_title_suffix");

  document.getElementById("liveRate").innerText =
    window.translateText("details_live_rate", { rate: rate.toFixed(2), currency: currency });

  document.getElementById("demand").innerText =
    window.translateText("details_app_usage_demand", { demand: demandFactor.toFixed(2) });

  document.getElementById("compare").innerText =
    window.translateText("details_compared_line", { rate: rate.toFixed(2), currency: currency });

  document.getElementById("trend").innerText =
    demandFactor > 1.3
      ? window.translateText("details_trend_strong")
      : window.translateText("details_trend_stable");

  drawChart(currency, rate);
  updateComparisonTable();
}

function drawChart(currency, rate) {
  let canvas = document.getElementById("chart");
  let ctx = canvas.getContext("2d");

  canvas.width = 600;
  canvas.height = 300;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let history = JSON.parse(localStorage.getItem("history")) || [];
  let usage = 0;
  let data = [];

  for (let i = 0; i < Math.max(10, history.length); i++) {
    if (history[i] && (history[i].from === currency || history[i].to === currency)) {
      usage++;
    }
    let value = rate + usage * 0.5 + (Math.random() * 2 - 1);
    data.push(value);
  }

  let min = Math.min(...data);
  let max = Math.max(...data);

  function x(i) {
    return i * 50 + 20;
  }

  function y(v) {
    return 250 - ((v - min) / (max - min)) * 200;
  }

  ctx.beginPath();
  ctx.moveTo(x(0), y(data[0]));
  for (let i = 1; i < data.length; i++) {
    ctx.lineTo(x(i), y(data[i]));
  }
  ctx.strokeStyle = "green";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.fillText(window.translateText("chart_label", { currency: currency }), 20, 20);
}

function updateComparisonTable() {
  let table = document.getElementById("compareTable");
  table.innerHTML = "";
  let max = 4000;

  Object.keys(baseRates).forEach(cur => {
    let demand = getDemandFactor(cur);
    let rate = baseRates[cur] * demand;
    let width = (rate / max) * 100;
    let color = rate > 1000 ? "green" : rate > 100 ? "orange" : "red";

    table.innerHTML += `
      <tr>
        <td>${cur}</td>
        <td>${rate.toFixed(2)}</td>
        <td>
          <div style="background:#ddd; width:100%; height:15px;">
            <div style="width:${width}%; height:15px; background:${color};"></div>
          </div>
        </td>
      </tr>
    `;
  });
}

setInterval(updateDetails, 4000);
updateDetails();
</script>

</body>
</html>
