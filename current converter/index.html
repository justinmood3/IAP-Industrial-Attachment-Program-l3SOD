<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="2.png" type="image/png">
        <title>CURRENT CONVERTER 2026</title>
        <link rel="styleSheet" href="style.css">
        <link rel="styleSheet" href="settings.css">
        <script src="settings.js" defer></script>
    </head>
    <body>
        <header>
            <img src="1.png" controls width="50" height="50">
            <h3 data-i18n="header_main">CURRENT CONVERTER 2026</h3>
            <nav>
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="converter.html" data-i18n="nav_converter">Converter</a>
                <a href="details.html" data-i18n="nav_details">Details</a>
                <a href="history.html" data-i18n="nav_history">History</a>
                <a href="settings.html" data-i18n="nav_settings">Settings</a>
            </nav>
        </header>
        <div class="div">
            <pre><span data-i18n="hero_line1">Currency made simple</span>
<span data-i18n="hero_line2">Convert money instantly in real-time</span></pre>
        </div>
        <div class="con">
            <input type="number" id="amount" data-i18n-placeholder="enter_amount" placeholder="ENTER AMOUNT"><br><br>
            <label data-i18n="label_from">FROM:</label>
            <select id="fromCurrency">
                <option value="RWF">RWF</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>&nbsp;&nbsp;&nbsp;
            <label data-i18n="label_to">TO:</label>
            <select id="toCurrency">
                <option value="USD">USD</option>
                <option value="RWF">RWF</option>
                <option value="EUR">EUR</option>
            </select><br><br>
            <button onclick="convert()" data-i18n="btn_convert">Convert</button>
            <p id="result"></p>
        </div><br><br>
        <span data-i18n="text_for_more">For more</span> <button class="btn"><a href="converter.html" data-i18n="btn_get_start">Get Started</a></button>
        <script>
        const rates = {
          USD: 1,
          EUR: 0.92,
          RWF: 1300
        };

        function convert() {
          let amount = document.getElementById("amount").value;
          let from = document.getElementById("fromCurrency").value;
          let to = document.getElementById("toCurrency").value;

          if (!amount || amount <= 0) {
            alert(window.translateText("alert_valid_amount"));
            return;
          }

          let result = (amount / rates[from]) * rates[to];

          document.getElementById("result").innerText =
            `${amount} ${from} = ${result.toFixed(2)} ${to}`;

          if (typeof saveHistory === "function") {
            saveHistory(amount, from, to, result);
          }
        }
        </script>
    </body>
</html>
