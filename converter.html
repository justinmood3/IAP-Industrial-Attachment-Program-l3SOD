<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="2.png" type="image/png">
        <title>CURRENT CONVERTER 2026</title>
        <link rel="styleSheet" href="convert.css">
        <link rel="styleSheet" href="settings.css">
        <script src="settings.js" defer></script>
    </head>
    <body>
        <header>
            <img src="1.png" controls width="50" height="50">
            <h3 data-i18n="header_main">CURRENT CONVERTER 2026</h3>
            <nav>
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="converter.html" data-i18n="nav_converter">Converter</a>
                <a href="details.html" data-i18n="nav_details">Details</a>
                <a href="history.html" data-i18n="nav_history">History</a>
                <a href="settings.html" data-i18n="nav_settings">Settings</a>
            </nav>
        </header>
        <div class="div">
            <input type="number" id="amount" data-i18n-placeholder="enter_amount" placeholder="ENTER AMOUNT"><br><br>
            <label data-i18n="label_from">FROM:</label>
            <select id="from">
                <option>USD</option>
                <option>EUR</option>
                <option>GBP</option>
                <option>RWF</option>
                <option>KES</option>
                <option>UGX</option>
                <option>TZS</option>
                <option>NGN</option>
                <option>ZAR</option>
                <option>JPY</option>
            </select>
            <button onclick="swap()" class="button">↔</button>
            <label data-i18n="label_to">TO:</label>
            <select id="to">
                <option>RWF</option>
                <option>EUR</option>
                <option>USD</option>
                <option>GBP</option>
                <option>KES</option>
                <option>UGX</option>
                <option>TZS</option>
                <option>NGN</option>
                <option>ZAR</option>
                <option>JPY</option>
            </select><br><br>
            <button onclick="convert()" data-i18n="btn_convert">Convert</button>
            <h1 id="result"></h1>
            <p id="rate"></p>
            <p id="time"></p>
        </div>
        <script src="script.js"></script>
    </body>
    <footer>
        &copy;Justinmood3
    </footer>
</html>
